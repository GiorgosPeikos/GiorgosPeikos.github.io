university:
  title: "Teaching in Information Retrieval & Recommender Systems"
  org: "University of Milano-Bicocca"
  year: "2022-2026"
  materials_year: "2025-2026"
  description: "Selected materials from my lectures and labs in Information Retrieval and Recommender Systems, with a focus on evaluation, neural retrieval, modern retrieval systems, and hands-on experimentation."
  lectures:
    - title: "Introduction to Neural IR"
      file: "/assets/teaching/Neural%20Information%20Retrieval%20Models%20%5B2025%20-%202026%5D.pdf"
      description: "Lecture slides introducing neural information retrieval models, dense retrieval, neural ranking, and modern retrieval pipelines."
    - title: "On the Intersection of IR, LLMs, ConvAI, RAG and Agents"
      file: "/assets/teaching/IR%20-%20RS%20-%20LLMs%20-%20ConvAI%20-%20RAG%20-%20Agents.pdf"
      description: "Overview lecture connecting information retrieval, recommender systems, large language models, conversational AI, retrieval-augmented generation, and agentic systems."
    - title: "On the Evaluation of IR Systems"
      file: "/assets/teaching/0.%20Information%20Retrieval%20Evaluation%20%5B2025%20-%202026%5D.pdf"
      description: "Lecture slides on evaluating information retrieval systems, including test collections, relevance judgments, effectiveness metrics, and analysis practices."
  labs:
    - title: "Hands-on IR Experimentation Lab"
      file: "/assets/teaching/Hands-on%20Retrieval%20Experiment%20-%20Clinical%20Trials.pdf"
      description: "Hands-on lab for running and evaluating a retrieval experiment in the clinical-trials domain."
  projects:
    - title: "Financial IR Project"
      file: "/assets/teaching/IR_RS_Project_A___FinQA_Retrieval___2025.pdf"
      description: "Practical IR problem developed for students to solve, focused on retrieval for financial question answering."
    - title: "Health Retrieval Project"
      file: "/assets/teaching/IR_RS_Project_C___Health_Retrieval___2025.pdf"
      description: "Practical IR problem developed for students to solve, focused on retrieval for health-related information needs."
    - title: "Historical News Retrieval Project"
      file: "/assets/teaching/IR_RS_Project_B___Historical_News_Retrieval___2025.pdf"
      description: "Practical IR problem developed for students to solve, focused on retrieval over historical news collections."

